<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem("cp_dark_mode")==="true"||(localStorage.getItem("cp_dark_mode")===null&&matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.setAttribute("data-theme","dark")}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{CANONICAL}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{CANONICAL}}">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:image" content="https://convertpivot.com/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="/favicon.png" sizes="32x32">
  <link rel="icon" href="/favicon-16.png" sizes="16x16">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"BlogPosting","headline":"{{HEADLINE}}","description":"{{META_DESCRIPTION}}","datePublished":"{{DATE}}","author":{"@type":"Person","name":"ConvertPivot"}}</script>
  {{FAQ_SCHEMA}}
  <style>.blog-content{max-width:720px;margin:32px 0;line-height:1.8;color:var(--color-graphite)}.blog-content h2{color:var(--color-ink);margin-top:36px}.blog-content table{width:100%;border-collapse:collapse;margin:16px 0}.blog-content th,.blog-content td{border:1px solid var(--color-mist);padding:10px 14px;text-align:left;font-size:0.9rem}.blog-content th{background:var(--color-red);color:#fff}.blog-content .related-tools{margin:32px 0;padding:20px;border:1px solid var(--color-mist);border-radius:8px}.blog-content .related-tools h3{margin-bottom:12px}</style>
</head>
<body>
  <header class="site-header"><button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle navigation">☰</button><a href="../" class="site-logo"><span class="logo-mark">P</span><span>ConvertPivot</span></a><button id="darkModeToggle" class="dark-toggle" aria-label="Toggle dark mode">🌙</button></header>
  <nav id="sidebar" class="sidebar" aria-label="Tool navigation"></nav>
  <main id="main-content" class="main-content">
    <nav class="breadcrumb"><a href="../">Home</a><span class="sep">›</span><a href="/blog">Blog</a><span class="sep">›</span><span class="current">{{HEADLINE}}</span></nav>
    <article class="blog-content">
      <span style="display:inline-block;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:2px 10px;border-radius:3px;background:var(--color-red);color:#fff;margin-bottom:12px;">{{CATEGORY}}</span>
      <h1>{{HEADLINE}}</h1>
      <p style="font-size:0.85rem;color:var(--color-graphite);margin-bottom:24px;">{{DATE}}</p>
      {{BODY}}
      {{FAQ_HTML}}
      {{TOOLS_HTML}}
    </article>
    <div class="ad-container">Ad</div>
  </main>
  <footer class="site-footer">
    <div class="footer-content"><div class="footer-copy">© 2026 ConvertPivot. Free online converter tools.</div><div class="footer-links"><a href="../">Home</a><a href="/about">About</a><a href="/blog">Blog</a><a href="/privacy">Privacy</a><a href="/terms">Terms</a><a href="/contact">Contact</a></div></div>
  </footer>
  <script src="../js/shared.js"></script>
</body>
</html>
