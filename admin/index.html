<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Manager — ConvertPivot</title>
<script src="https://cdn.jsdelivr.net/npm/decap-cms@latest/dist/decap-cms.js"></script>
<style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f0f;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}.loader{display:inline-block;width:28px;height:28px;border:3px solid #333;border-top-color:#FF0000;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
<div id="cmsStatus"><div class="loader"></div><div>Loading CMS...</div></div>
<script>
(function(){
  var statusEl = document.getElementById('cmsStatus');
  var tries = 0;
  var maxTries = 30;

  function tryInit() {
    if (typeof CMS !== 'undefined' && CMS.init) {
      statusEl.style.display = 'none';
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'nihalusaidh/convertpivot',
            branch: 'main',
            base_url: 'https://convertpivot.com',
            auth_endpoint: '/api/auth'
          },
          media_folder: 'images/uploads',
          public_folder: '/images/uploads',
          collections: [{
            name: 'blog',
            label: 'Blog Posts',
            folder: 'content/blog',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Slug', name: 'slug', widget: 'string' },
              { label: 'Meta Description', name: 'description', widget: 'string' },
              { label: 'Category', name: 'category', widget: 'string' },
              { label: 'Publish Date', name: 'date', widget: 'datetime' },
              { label: 'Featured Image', name: 'image', widget: 'image', required: false },
              { label: 'Body', name: 'body', widget: 'markdown' },
              { label: 'FAQ Q1', name: 'faq1_q', widget: 'string', required: false },
              { label: 'FAQ A1', name: 'faq1_a', widget: 'text', required: false },
              { label: 'FAQ Q2', name: 'faq2_q', widget: 'string', required: false },
              { label: 'FAQ A2', name: 'faq2_a', widget: 'text', required: false },
              { label: 'FAQ Q3', name: 'faq3_q', widget: 'string', required: false },
              { label: 'FAQ A3', name: 'faq3_a', widget: 'text', required: false },
              { label: 'FAQ Q4', name: 'faq4_q', widget: 'string', required: false },
              { label: 'FAQ A4', name: 'faq4_a', widget: 'text', required: false },
              { label: 'FAQ Q5', name: 'faq5_q', widget: 'string', required: false },
              { label: 'FAQ A5', name: 'faq5_a', widget: 'text', required: false },
              { label: 'Related Tool 1', name: 'tool1', widget: 'string', required: false },
              { label: 'Related Tool 2', name: 'tool2', widget: 'string', required: false },
              { label: 'Related Tool 3', name: 'tool3', widget: 'string', required: false },
              { label: 'Related Tool 4', name: 'tool4', widget: 'string', required: false }
            ]
          }]
        }
      });
    } else {
      tries++;
      if (tries < maxTries) {
        setTimeout(tryInit, 200);
      } else {
        statusEl.innerHTML = '<div style="color:#ef4444;font-size:1.1rem;margin-bottom:8px">CMS Failed to Load</div><p style="color:#888;font-size:0.85rem">Check your internet connection and <a href="javascript:location.reload()" style="color:#FF0000">refresh</a>.</p>';
      }
    }
  }

  tryInit();
})();
</script>
</body>
</html>
